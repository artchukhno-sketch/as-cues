<body data-page="cues">
<div id="site-header"></div>

<main>
  <header class="page-head">
    <div class="wrap">
      <div class="page-head__inner">
        <div class="breadcrumbs"><a href="index.html">Головна</a> &nbsp;/&nbsp; <a href="index.html#catalog">Каталог</a> &nbsp;/&nbsp; <span id="crumb-model">Модель</span></div>
        <span class="eyebrow" id="model-group">Модель</span>
        <h1 id="model-title">Модель кия</h1>
        <p id="model-sub"></p>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="wrap">
      <!-- сборки кия: справка, общая для всех моделей (js/construction-data.js) -->
      <div id="construction-root"></div>
      <!-- сюда рендерится модель из js/catalog-data.js по ?slug= -->
      <div id="model-root"></div>
    </div>
  </section>

  <!-- CTA -->
  <section class="section dark">
    <div class="wrap reveal">
      <div class="cta-block">
        <span class="eyebrow center">Готові замовити?</span>
        <h2>Зберемо цей кий під вашу гру</h2>
        <p class="lead" style="margin-inline:auto">Дерево, баланс, довжина та вага — під вас. Залиште заявку, менеджер уточнить деталі та ціну.</p>
        <div class="btn-row" style="justify-content:center">
          <a class="btn btn--gold" href="contacts.html#zayavka">Зв’язатися</a>
          <a class="btn btn--ghost" href="index.html#catalog">← Назад до каталогу</a>
        </div>
      </div>
    </div>
  </section>

  <!-- липкая кнопка: быстрый переход к другим моделям (js/main.js) -->
  <div class="catalog-jump">
    <button type="button" class="quicknav-open" aria-haspopup="dialog" aria-label="Усі моделі">
      <svg class="quicknav-open__icon" viewBox="-1.5 0 17.5 16" aria-hidden="true" focusable="false">
        <circle cx="1.5" cy="3" r="1.5" fill="currentColor"/><path d="M6 3h10" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="1.5" cy="8" r="1.5" fill="currentColor"/><path d="M6 8h10" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="1.5" cy="13" r="1.5" fill="currentColor"/><path d="M6 13h10" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <span class="quicknav-open__label">Усі моделі</span> <span class="quicknav-open__count"></span>
    </button>
  </div>

  <!-- Панель быстрой навигации (выезжает справа) -->
  <div class="quicknav" id="quicknav" aria-hidden="true">
    <div class="quicknav__overlay" data-quicknav-close></div>
    <aside class="quicknav__panel" role="dialog" aria-modal="true" aria-label="Усі моделі">
      <div class="quicknav__head">
        <span class="quicknav__title">Усі моделі</span>
        <button type="button" class="quicknav__close" aria-label="Закрити" data-quicknav-close>&times;</button>
      </div>
      <nav class="quicknav__list" id="quicknav-list"><!-- список из catalog-data.js --></nav>
    </aside>
  </div>
</main>

<div id="site-footer"></div>
